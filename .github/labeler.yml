src:
  - changed-files:
      - any-glob-to-any-file:
          - "src/**"
          - "app/**"
styles:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.css"
          - "**/*.scss"
public:
  - changed-files:
      - any-glob-to-any-file: "public/**"
documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - "docs/**"
ci:
  - changed-files:
      - any-glob-to-any-file: ".github/workflows/**"
